# Entry 01 Starting from nothing

## Where I am
First proper documentation entry. The project technically started April 21 to figure out what this project even is. As of today (April 23) I have: (nothing is pushed as of yet)

- A spec document submitted to KTH (voluntary feedback, deadline April 24)
- A GitHub repo with folder structure set up
- Zero GLSL shaders
- no p5.js game skeleton with state machine, no dialogue system, no audio system, and no room files
- Zero sprites, zero normal maps, zero actual rendering pipeline

This blog is where I document the journey changing.

##  (April 21–22)

Started from the brief: DH2323, Grade A, horror game, custom graphics. Didn't know what tech stack to use.

 I used Perplexity to ask what should i use initially pushed me toward Processing (Java)  the course-standard environment. Generated a full spec under the title "Liminal" with a character named Mira in a school corridor. That spec is good on paper but I changed direction.

Key things that came out of those sessions:

**What I decided:**
- The antagonist has no sprite. It is rendered entirely as an SDF shadow mathematics only. That became the concept: Charlie Chat.
- p5.js + GLSL in the browser, not Processing/Java. Faster iteration, runs anywhere, still real GLSL.
- Story: Charlie (player) and Charlie Chat (antagonist). Based on an original story "Let Me Ask Charlie."
- The rendering system IS the horror. Lights flicker = shader glitch. Charlie Chat grows = shadow math.

**What is still unresolved:**
- The full story hasn't been written yet. Characters exist (Charlie, Charlie Chat), world is established, but the branching narrative hasn't been designed.
-  Would a p5.js + GLSL browser implementation be treated equivalently to a native OpenGL project for grading purposes?
- Is a three-room interactive vignette sufficient scope for the application layer, given the rendering system is the primary contribution?
- Any advice on normal map pipeline for 2D pixel art specifically: hand-painted maps vs. procedural derivation?

**The spec that was submitted (April 24 deadline):**
- Filed under filename: `Charlie-Chat-Spec-v1.pdf`
- Central research question: How does a custom Normal-Mapped Sprite Pipeline combined with SDF-based dynamic shadows and post-processing atmospheric effects influence player perception of fear, depth, and spatial orientation in a 2D horror context?
- Included: pipeline description, N·L diffuse math, Quilez SDF shadow formula, user study design (SAM scale, n≥5), milestone plan
- Did NOT include: the full story (story is still in progress)

## What I learned today (concepts I didn't know before)

**Normal map:** A texture where each pixel's RGB stores which direction that surface is facing. R = facing right, G = facing up, B = facing toward camera. Stored as (128, 128, 255) for a flat surface facing straight at you. With this information, a flat 2D sprite can respond to a moving light as if it has depth.

**N·L dot product:** For each pixel: how directly is the light hitting this surface? If the surface normal and the light direction are aligned (facing each other), the dot product is 1 = full brightness. If they're perpendicular (grazing angle), dot product approaches 0 = dark. That's the whole lighting model in one formula.

**SDF (Signed Distance Field):** For any point in space, it returns how far you are from the nearest shape. Negative = inside the shape. Zero = exactly on the surface. Positive = outside. The shadow shader walks from each pixel toward the light, checking this distance at each step. If it drops below zero, something is blocking the light shadow.

**Sphere tracing (Hart 1996):** Instead of stepping in fixed increments, you step by the SDF value itself if you're 20px away from the shape, you can safely step 20px without missing it. Faster than fixed-step raymarching.

**Soft shadows (Quilez):** Instead of hard shadow/no shadow, accumulate a softness factor during the march: `min(k * h / t, res)`. The closer you come to an occluder, the softer the penumbra. That creeping soft darkness is what makes it feel real.

**Post-processing pass:** After the scene is rendered, run the whole image through another shader. Bloom = bright areas bleed into neighbors (9-tap kernel). Vignette = multiply edges to black via smoothstep. Reinhard tone mapping = prevents whites from clipping. Film grain = hash-based noise added per pixel. Same as Lightroom adjustments but in GLSL.

      (function () {
        marked.setOptions({
          gfm: true,
          headerIds: false,
          mangle: false,
          highlight: function (code, lang) {
            try {
              if (lang && hljs.getLanguage(lang)) {
                return hljs.highlight(code, { language: lang }).value;
              }
              return hljs.highlightAuto(code).value;
            } catch {
              return code;
            }
          },
        });

        function escapeHtmlAttr(s) {
          return String(s)
            .replaceAll("&", "&amp;")
            .replaceAll('"', "&quot;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;");
        }

        function normalizeFileName(raw) {
          return String(raw)
            .replaceAll("\u202f", " ")
            .replaceAll("\u00a0", " ")
            .trim();
        }

        function toMediaHtml(fileNameRaw) {
          const fileName = normalizeFileName(fileNameRaw);
          const lower = fileName.toLowerCase();
          const src = "../media/" + encodeURIComponent(fileName);

          if (
            lower.endsWith(".mov") ||
            lower.endsWith(".mp4") ||
            lower.endsWith(".webm")
          ) {
            return (
              '<video controls playsinline preload="metadata" src="' +
              escapeHtmlAttr(src) +
              '"></video>'
            );
          }

          return (
            '<img loading="lazy" alt="' +
            escapeHtmlAttr(fileName) +
            '" src="' +
            escapeHtmlAttr(src) +
            '"/>'
          );
        }

        function preprocessObsidianEmbeds(mdText) {
          return mdText.replace(/!\[\[([^\]]+?)\]\]/g, function (_m, inner) {
            return toMediaHtml(inner);
          });
        }

        const md = document.querySelector("textarea.entry-md");
        const rendered = document.querySelector(".entry-rendered");
        const raw = md?.value ?? "";
        const preprocessed = preprocessObsidianEmbeds(raw);
        rendered.innerHTML = marked.parse(preprocessed);
        rendered
          .querySelectorAll("pre code")
          .forEach((el) => hljs.highlightElement(el));
      })();
    </script>
